<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  
<defs>
  <style>
    text { font-family: Arial, sans-serif; font-weight: bold; }
    .title-text { font-size: 24px; }
    .main-label { font-size: 20px; }
    .medium-text { font-size: 16px; }
    .small-text { font-size: 13px; }
    .label { fill: #1a1a1a; }
    .light-label { fill: #444; font-size: 12px; }
  </style>
  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
  </filter>
</defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="600" y="40" class="title-text label" text-anchor="middle">AI/ML/Data Science Ecosystem</text>

  <!-- Large Venn Circles -->
  <!-- AI Circle (Left) - Red/Orange -->
  <circle cx="320" cy="360" r="220" fill="#FF6B6B" opacity="0.12" stroke="#FF6B6B" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- ML Circle (Right) - Blue -->
  <circle cx="680" cy="360" r="220" fill="#4ECDC4" opacity="0.12" stroke="#4ECDC4" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- Data Science Circle (Bottom) - Yellow -->
  <circle cx="500" cy="540" r="220" fill="#FFE66D" opacity="0.12" stroke="#FFE66D" stroke-width="3" filter="url(#shadow)"/>

  <!-- Circle Labels (Main) -->
  <text x="200" y="280" class="main-label label">ARTIFICIAL</text>
  <text x="220" y="305" class="main-label label">INTELLIGENCE</text>
  
  <text x="650" y="280" class="main-label label">MACHINE</text>
  <text x="680" y="305" class="main-label label">LEARNING</text>
  
  <text x="420" y="730" class="main-label label">DATA SCIENCE</text>

  <!-- AI-Only Zone (Left side) -->
  <text x="150" y="380" class="medium-text label">Computer Vision</text>
  <text x="160" y="410" class="small-text light-label">Robotics</text>
  <text x="165" y="430" class="small-text light-label">NLP</text>
  <text x="155" y="450" class="small-text light-label">Knowledge Graphs</text>

  <!-- ML-Only Zone (Right side) -->
  <text x="750" y="380" class="medium-text label">Supervised Learning</text>
  <text x="770" y="410" class="small-text light-label">Classification</text>
  <text x="770" y="430" class="small-text light-label">Regression</text>
  <text x="760" y="450" class="small-text light-label">Ensemble Methods</text>

  <!-- Data Science-Only Zone (Bottom) -->
  <text x="420" y="630" class="small-text light-label">Data Visualization</text>
  <text x="440" y="650" class="small-text light-label">Statistics & Analytics</text>
  <text x="450" y="670" class="small-text light-label">Data Cleaning</text>

  <!-- AI + ML (Top overlap - Purple) -->
  <text x="430" y="310" class="medium-text label" fill="#8B5CF6">Deep Learning</text>
  <text x="420" y="335" class="small-text light-label" fill="#6D28D9">Neural Networks</text>
  <text x="435" y="355" class="small-text light-label" fill="#6D28D9">Transformers</text>

  <!-- AI + Data Science (Left-Bottom overlap) -->
  <text x="280" y="520" class="small-text light-label">Feature Engineering</text>
  <text x="275" y="540" class="small-text light-label">AI Ethics</text>

  <!-- ML + Data Science (Right-Bottom overlap) -->
  <text x="640" y="520" class="small-text light-label">Predictive Modeling</text>
  <text x="660" y="540" class="small-text light-label">Model Evaluation</text>

  <!-- CENTER - All Three Overlap (Red/Dark) -->
  <circle cx="500" cy="420" r="60" fill="#EB3367" opacity="0.3"/>
  <text x="500" y="410" class="medium-text label" fill="#C41E3A" text-anchor="middle">GenAI</text>
  <text x="500" y="435" class="small-text light-label" fill="#8B0000" text-anchor="middle">Agentic AI</text>
  <text x="500" y="455" class="small-text light-label" fill="#8B0000" text-anchor="middle">LLMs</text>

  <!-- Special Highlights with badges -->
  <!-- GenAI Badge -->
  <rect x="870" y="200" width="280" height="100" rx="10" fill="#FFF3CD" stroke="#FF9800" stroke-width="2"/>
  <text x="1010" y="225" class="medium-text label" text-anchor="middle" fill="#E65100">Generative AI</text>
  <text x="920" y="250" class="small-text light-label" fill="#333">• ChatGPT, Claude</text>
  <text x="920" y="270" class="small-text light-label" fill="#333">• Image Generation</text>
  <text x="920" y="290" class="small-text light-label" fill="#333">• Code Generation</text>

  <!-- Agentic AI Badge -->
  <rect x="870" y="330" width="280" height="100" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="1010" y="355" class="medium-text label" text-anchor="middle" fill="#1B5E20">Agentic AI</text>
  <text x="920" y="380" class="small-text light-label" fill="#333">• Autonomous Agents</text>
  <text x="920" y="400" class="small-text light-label" fill="#333">• Decision Making</text>
  <text x="920" y="420" class="small-text light-label" fill="#333">• Tool Use & Reasoning</text>

  <!-- Connection lines -->
  <line x1="1010" y1="200" x2="600" y2="120" stroke="#FF9800" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  <line x1="1010" y1="330" x2="580" y2="450" stroke="#4CAF50" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>

  <!-- Legend -->
  <g transform="translate(50, 800)">
    <text x="0" y="0" class="small-text label" fill="#333">Key Concepts:</text>
    <text x="0" y="25" class="small-text" fill="#555">• AI: Broad field of intelligent systems and reasoning</text>
    <text x="0" y="45" class="small-text" fill="#555">• ML: Learning algorithms that improve with data</text>
    <text x="0" y="65" class="small-text" fill="#555">• Data Science: Extracting insights and knowledge from data</text>
  </g>

</svg>